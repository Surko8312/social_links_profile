<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="container">

    <div class="user_card">

      <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall" class="avatar_picture">

        <p class = "username"> Jessica Randall</p>

          <p class = "location"> London, United Kingdom</p>

            <p class = "description"> "Front-end developer and avid reader." </p>

            <div class="buttons">

              <button class="github_button"> GitHub </button>

                <button class="frontend_mentor_button"> Frontend Mentor </button>

                  <button class="LinkedIn_button"> LinkedIn </button>

                    <button class="twitter_button"> Twitter </button>

                      <button class="instagram_button"> Instagram </button>

            </div>

  
 

    </div>

  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Kelemen Xavér</a>.
  </footer>
</body>
</html>
